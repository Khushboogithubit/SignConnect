<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Text to Sign Language</title>
  <link rel="stylesheet" href="../text_to_sign.css">
</head>

<body>

  <div class="container">

    <h1>Text → Sign Language Converter</h1>

    <!-- INPUT AREA -->
    <input type="text" id="textInput" placeholder="Type a sentence..." />

    <!-- BUTTONS -->
    <div class="buttons">
      <button onclick="convertText()">Convert</button>
      <button onclick="startSpeech()">🎤 Speak</button>
    </div>

    <!-- OUTPUT -->
    <div id="videoContainer"></div>

  </div>

  <script src="../script.js"></script>

</body>
</html>
